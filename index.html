<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>周達弘 - 個人網站</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f0f18">
</head>
<body>
  <div class="scene">
    <div class="scanlines"></div>
    <header class="card">
      <h1 class="name">周達弘</h1>
      <p class="id">學號 5112056037</p>
      <div class="clock" aria-live="polite">
        現在時間： <span id="clock">--:--:--</span>
      </div>
    </header>
    <footer class="hint">科幻 · 賽博龐克 · 未來感</footer>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const opts = { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' };
      document.getElementById('clock').textContent = now.toLocaleString('zh-TW', opts);
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
